<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION.EXE - DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        body {
            display: none; 
        }

        .dashboard-hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--paper);
        }
        
        .massive-text {
            font-size: clamp(60px, 15vw, 180px);
            color: var(--ink);
            margin: 0;
            letter-spacing: 10px;
        }

        /* --- THE NEW EMAIL DISPLAY STYLE --- */
        .user-status {
            position: fixed;
            bottom: 24px;
            left: 40px; /* Aligns nicely with your navbar padding */
            font-size: 10px;
            color: var(--mid);
            z-index: 100;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="logo">VISION.EXE // SECURE</div>
        <button class="early-btn" id="logout-btn">DISCONNECT</button>
    </nav>

    <main class="dashboard-hero">
        <h1 class="massive-text">HI :)<span class="cursor">█</span></h1>
    </main>

    <div class="user-status">> USER_ID: <span id="active-email">loading...</span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // TODO: USE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "your-project.firebaseapp.com",
            projectId: "your-project",
            storageBucket: "your-project.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abcdef"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check if the user is allowed here
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 1. Unhide the page!
                document.body.style.display = 'block';
                
                // 2. INJECT THE EMAIL INTO THE BOTTOM LEFT!
                document.getElementById('active-email').innerText = user.email;
            } else {
                // User is NOT signed in. Kick them to the login page.
                window.location.replace('login.html');
            }
        });

        // Wire up the Disconnect button
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace('index.html');
            });
        });
    </script>
</body>
</html>
