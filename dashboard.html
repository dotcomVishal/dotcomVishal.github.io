<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISION.EXE - DASHBOARD</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 1. HIDE THE PAGE BY DEFAULT to prevent a "flash" of content before kicking them out */
        body {
            display: none; 
        }

        .dashboard-hero {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--paper);
        }
        
        .massive-text {
            font-size: clamp(60px, 15vw, 180px);
            color: var(--ink);
            margin: 0;
            letter-spacing: 10px;
        }
    </style>
</head>
<body>

    <nav class="main-nav">
        <div class="logo">VISION.EXE // SECURE</div>
        <button class="early-btn" id="logout-btn">DISCONNECT</button>
    </nav>

    <main class="dashboard-hero">
        <h1 class="massive-text">HI :)<span class="cursor">█</span></h1>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        // TODO: USE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
    apiKey: "AIzaSyBbctYUjzVKpBFjMN_w5MPT1Dwm_ktjt9Y",
    authDomain: "vision-exe.firebaseapp.com",
    projectId: "vision-exe",
    storageBucket: "vision-exe.firebasestorage.app",
    messagingSenderId: "349075462702",
    appId: "1:349075462702:web:a5cd6a30cd88001f025dbf"
  };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Check if the user is allowed here
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in. Unhide the page!
                document.body.style.display = 'block';
            } else {
                // User is NOT signed in. Kick them to the login page.
                window.location.replace('login.html');
            }
        });

        // Wire up the Disconnect button
        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace('index.html');
            });
        });
    </script>
</body>
</html>
